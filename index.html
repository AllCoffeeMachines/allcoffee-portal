<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Coffee Machines - Seguimiento</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}

header {
    background:#111;
    color:white;
    padding:25px;
    text-align:center;
}

.container {
    max-width:600px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

input, button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

button {
    background:#111;
    color:white;
    cursor:pointer;
}

.status {
    margin-top:20px;
    padding:20px;
    border-radius:10px;
    background:#eee;
    display:none;
}

.logo {
    font-size:25px;
    font-weight:bold;
}
</style>

</head>

<body>

<header>
<div class="logo">All Coffee Machines</div>
<p>Seguimiento de reparación</p>
</header>


<div class="container">

<h2>Consultar estado</h2>

<p>Ingresá tu número de orden y DNI</p>

<input id="orden" placeholder="Número de orden">

<input id="dni" placeholder="DNI">

<button onclick="buscar()">Consultar reparación</button>


<div class="status" id="resultado"></div>

</div>


<script>

const reparaciones = [
{
orden:"1001",
dni:"12345678",
cliente:"Cliente ejemplo",
estado:"Reparación en proceso",
detalle:"La máquina se encuentra en reparación y pruebas finales."
},

{
orden:"1002",
dni:"87654321",
cliente:"Cliente ejemplo 2",
estado:"Lista para retirar",
detalle:"Su cafetera fue reparada correctamente."
}

];


function buscar(){

let orden=document.getElementById("orden").value;
let dni=document.getElementById("dni").value;

let resultado=document.getElementById("resultado");


let encontrado=reparaciones.find(
r=>r.orden===orden && r.dni===dni
);


resultado.style.display="block";


if(encontrado){

resultado.innerHTML=
`
<h3>${encontrado.estado}</h3>
<p>${encontrado.detalle}</p>
`;

}else{

resultado.innerHTML=
`
<h3>No encontramos la reparación</h3>
<p>Verificá el número de orden y DNI.</p>
`;

}

}

</script>


</body>
</html>
