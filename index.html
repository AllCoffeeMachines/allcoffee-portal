<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All Coffee Machines | Seguimiento de reparación</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0c0c0c;
color:#ffffff;
}

header{
background:#111;
padding:30px 20px;
text-align:center;
border-bottom:1px solid #333;
}

.logo{
width:220px;
max-width:90%;
margin:auto;
}

header p{
color:#c9c9c9;
font-size:18px;
}

.container{
max-width:600px;
margin:40px auto;
padding:25px;
}

.card{
background:#171717;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h2{
margin-top:0;
font-size:28px;
}

input{
width:100%;
padding:15px;
margin-top:15px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:100%;
margin-top:20px;
padding:15px;
background:#c89b3c;
color:#111;
font-weight:bold;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.resultado{
display:none;
margin-top:25px;
padding:20px;
background:#222;
border-left:5px solid #c89b3c;
border-radius:8px;
}

footer{
text-align:center;
color:#aaa;
padding:30px;
font-size:14px;
}

</style>

</head>
<body>

<header>

<img src="logo-allcoffee.png" class="logo" alt="All Coffee Machines">

<p>
Seguimiento online del estado de reparación de tu máquina de café
</p>

</header>


<div class="container">

<div class="card">

<h2>Consultar estado</h2>

<p>
Ingresá los datos de tu orden de reparación:
</p>


<input 
id="orden" 
placeholder="Número de orden">


<input 
id="dni" 
placeholder="DNI">


<button onclick="buscar()">
Consultar reparación
</button>


<div class="resultado" id="resultado">

</div>


</div>

</div>


<footer>

All Coffee Machines © 2026  
<br>
Servicio técnico especializado en máquinas de café

</footer>
<script>

const reparaciones = [

{
orden:"1001",
dni:"12345678",
estado:"Reparación en proceso",
detalle:"La máquina se encuentra en reparación y realizando pruebas técnicas."
},

{
orden:"1002",
dni:"87654321",
estado:"Lista para retirar",
detalle:"La reparación fue finalizada correctamente. Puede coordinar el retiro."
}

];


function buscar(){

let orden = document.getElementById("orden").value;
let dni = document.getElementById("dni").value;

let resultado = document.getElementById("resultado");


let reparacion = reparaciones.find(
item => item.orden === orden && item.dni === dni
);


resultado.style.display="block";


if(reparacion){

resultado.innerHTML = 
`
<h3>${reparacion.estado}</h3>
<p>${reparacion.detalle}</p>
`;

}else{

resultado.innerHTML =
`
<h3>No encontramos la reparación</h3>
<p>
Verificá que el número de orden y DNI sean correctos.
</p>
`;

}

}

</script>


</body>

</html>
