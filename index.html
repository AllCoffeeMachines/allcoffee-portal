<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All Coffee Machines | Seguimiento de reparación</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
}

header{
background:#111;
padding:30px 20px;
text-align:center;
border-bottom:1px solid #333;
}

.logo{
width:240px;
max-width:90%;
}

header p{
color:#ccc;
font-size:17px;
}

.container{
max-width:650px;
margin:40px auto;
padding:20px;
}

.card{
background:#171717;
padding:30px;
border-radius:15px;
box-shadow:0 10px 35px rgba(0,0,0,.5);
}

h1,h2,h3{
margin-top:0;
}

input{
width:100%;
padding:15px;
margin-top:15px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:100%;
margin-top:20px;
padding:15px;
border-radius:8px;
border:none;
background:#c89b3c;
color:#111;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.resultado{
display:none;
margin-top:25px;
background:#222;
padding:25px;
border-radius:12px;
border-left:5px solid #c89b3c;
}

.dato{
margin:8px 0;
color:#ddd;
}

.estado{
font-size:20px;
font-weight:bold;
color:#c89b3c;
margin:20px 0;
}

.progreso div{
padding:10px;
margin:6px 0;
border-radius:6px;
background:#333;
}

.activo{
background:#c89b3c !important;
color:#111;
font-weight:bold;
}

.footer{
text-align:center;
color:#999;
padding:30px;
font-size:14px;
}

</style>

</head>
<body>

<header>

<img src="logo-allcoffee.png" class="logo" alt="All Coffee Machines">

<p>
Seguimiento profesional del servicio técnico
</p>

</header>


<div class="container">

<div class="card">

<h2>Consultar reparación</h2>

<p>
Ingresá tu número de orden y DNI para conocer el estado de tu equipo.
</p>


<input 
id="orden" 
placeholder="Número de orden (Ej: 5200592)">


<input 
id="dni" 
placeholder="DNI">


<button onclick="buscar()">
Consultar estado
</button>


<div class="resultado" id="resultado">

</div>


</div>

</div>


<div class="footer">

All Coffee Machines © 2026  
<br>
Servicio técnico especializado en máquinas de café

</div>
<script>

const reparaciones = [

{
orden:"5200592",
dni:"12345678",
cliente:"Cliente Ejemplo",
equipo:"Máquina espresso profesional",
estado:"Reparación en proceso",
paso:4,
presupuesto:"85000",
fecha:"28/07/2026",
detalle:"Se detectó falla en sistema hidráulico. Se realizó intervención técnica y el equipo se encuentra en reparación."
}

];


function buscar(){

let orden = document.getElementById("orden").value;
let dni = document.getElementById("dni").value;

let resultado = document.getElementById("resultado");


let reparacion = reparaciones.find(
item => item.orden === orden && item.dni === dni
);


resultado.style.display="block";


if(reparacion){


let estados=[
"Equipo recibido",
"Diagnóstico técnico",
"Presupuesto enviado",
"Esperando aprobación del cliente",
"Reparación en proceso",
"Pruebas y control de calidad",
"Lista para entregar",
"Equipo entregado"
];


let progreso="";


estados.forEach((estado,index)=>{

let numero=index+1;

if(numero < reparacion.paso){

progreso += `<div>✓ ${estado}</div>`;

}

else if(numero === reparacion.paso){

progreso += `<div class="activo">🔧 ${estado}</div>`;

}

else{

progreso += `<div>○ ${estado}</div>`;

}

});


let presupuesto="";


if(reparacion.paso >= 4){

presupuesto =
`
<p class="dato">
<strong>Presupuesto aprobado:</strong> $${reparacion.presupuesto}
</p>
`;

}


resultado.innerHTML=
`

<h3>Orden #${reparacion.orden}</h3>

<p class="dato">
<strong>Cliente:</strong> ${reparacion.cliente}
</p>

<p class="dato">
<strong>Equipo:</strong> ${reparacion.equipo}
</p>


<p class="estado">
${reparacion.estado}
</p>


<div class="progreso">

${progreso}

</div>


${presupuesto}


<p class="dato">
<strong>Fecha estimada:</strong> ${reparacion.fecha}
</p>


<p class="dato">
<strong>Observación técnica:</strong><br>
${reparacion.detalle}
</p>


`;


}

else{


resultado.innerHTML=
`

<h3>No encontramos la reparación</h3>

<p>
Verificá que el número de orden y DNI sean correctos.
</p>

`;

}


}


</script>


</body>

</html>
